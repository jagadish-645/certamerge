name: Bug report
description: Report a reproducible CertaMerge community alpha problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Do not include secrets, tokens, raw proprietary source code, raw restricted diffs, or customer production data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide the smallest safe reproduction using sample files when possible.
      placeholder: |
        1. Run ...
        2. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Paste `certamerge --version` when available, or the commit SHA.
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - CLI
        - Recover
        - Gate
        - CAR verifier
        - GitHub Action
        - Docs/specs
        - Samples
  - type: checkboxes
    id: data-safety
    attributes:
      label: Data safety check
      options:
        - label: I removed secrets, tokens, raw proprietary source code, raw restricted diffs, and customer production data.
          required: true
