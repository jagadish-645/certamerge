name: CertaMerge Proof Gate
description: Run CertaMerge Community Gate in GitHub Actions and upload the generated CAR artifact.
inputs:
  policy:
    description: Path to the CertaMerge policy file.
    required: false
    default: .certamerge.yml
  repo:
    description: Repository path to evaluate.
    required: false
    default: .
  output:
    description: CAR output path.
    required: false
    default: certamerge-car.json
  fail-on-block:
    description: Fail the job when CertaMerge emits BLOCK, HARD_BLOCK, SOFT_BLOCK, REPAIR_REQUIRED, or NEEDS_EVIDENCE.
    required: false
    default: "false"
  artifact-name:
    description: Name for the uploaded CAR artifact.
    required: false
    default: certamerge-car
  changed-files:
    description: Optional newline-delimited changed-files list to scope Gate rule matching.
    required: false
    default: ""
  base:
    description: Optional base ref or SHA for git diff based change scope.
    required: false
    default: ""
  head:
    description: Optional head ref or SHA for git diff based change scope.
    required: false
    default: ""
outputs:
  car-path:
    description: Path to the generated Change Authorization Record.
    value: ${{ inputs.output }}
  verdict:
    description: CertaMerge verdict emitted by the generated CAR.
    value: ${{ steps.gate.outputs.verdict }}
  summary-path:
    description: Path to the workflow-native CertaMerge summary text.
    value: certamerge-summary.txt
runs:
  using: composite
  steps:
    - name: Install CertaMerge
      shell: bash
      run: python -m pip install "$GITHUB_ACTION_PATH/../.."
    - name: Run CertaMerge Gate
      id: gate
      shell: bash
      run: |
        args=(gate --repo "${{ inputs.repo }}" --policy "${{ inputs.policy }}" --output "${{ inputs.output }}")
        if [ -n "${{ inputs.changed-files }}" ]; then
          args+=(--changed-files "${{ inputs.changed-files }}")
        fi
        if [ -n "${{ inputs.base }}" ]; then
          args+=(--base "${{ inputs.base }}")
        fi
        if [ -n "${{ inputs.head }}" ]; then
          args+=(--head "${{ inputs.head }}")
        fi
        certamerge "${args[@]}" | tee certamerge-cli-output.txt
        python - "${{ inputs.output }}" "${{ inputs.artifact-name }}" <<'PY' >> "$GITHUB_OUTPUT"
        import json
        import sys
        car_path = sys.argv[1]
        artifact_name = sys.argv[2]
        summary_path = "certamerge-summary.txt"

        def compact(value, limit=240):
            text = str(value or "").replace("\r", " ").replace("\n", " ").strip()
            if len(text) > limit:
                return text[: limit - 3] + "..."
            return text

        with open(car_path, "r", encoding="utf-8") as handle:
            car = json.load(handle)

        verdict = car["verdict"]["state"]
        missing = car.get("missing_proof", [])
        trace = car.get("verdict_trace", [])
        matched = [item for item in trace if item.get("result") != "not_applicable"]
        evidence = car.get("evidence", [])
        next_action = car.get("accountable_next_action", {})
        lines = [
            "## CertaMerge Proof Gate",
            "",
            f"Verdict: `{compact(verdict, 80)}`",
            "",
            "Policy reason:",
            compact(car.get("verdict", {}).get("policy_reason", "<missing>")),
            "",
            "Matched rules:",
        ]
        if matched:
            lines.extend(f"- `{compact(item.get('rule_id', '<unknown>'), 120)}` - {compact(item.get('result', '<unknown>'), 80)}" for item in matched[:12])
        else:
            lines.append("- None.")
        lines.extend(["", "Evidence:"])
        if evidence:
            lines.extend(f"- `{compact(item.get('type', '<unknown>'), 80)}`: `{compact(item.get('state', '<unknown>'), 40)}`" for item in evidence[:20])
        else:
            lines.append("- None recorded.")
        lines.extend(["", "Missing proof:"])
        if missing:
            lines.extend(
                f"- `{compact(item.get('type', '<unknown>'), 80)}`: `{compact(item.get('state', '<unknown>'), 40)}` - {compact(item.get('reason', ''))}"
                for item in missing[:12]
            )
        else:
            lines.append("- None.")
        lines.extend(
            [
                "",
                "Accountable next action:",
                f"{compact(next_action.get('owner', '<missing>'), 80)} - {compact(next_action.get('action', '<missing>'))}",
                "",
                "CAR artifact:",
                f"`{compact(artifact_name, 120)}`",
                "",
                "Verification:",
                f"`python -m certamerge verify-car {compact(car_path, 160)}`",
            ]
        )
        with open(summary_path, "w", encoding="utf-8") as handle:
            handle.write("\n".join(lines) + "\n")
        print(f"verdict={verdict}")
        PY
    - name: Write CertaMerge PR Summary
      shell: bash
      if: always()
      run: |
        {
          if [ -f certamerge-summary.txt ]; then
            cat certamerge-summary.txt
          else
            echo "## CertaMerge Proof Gate"
            echo
            echo "CertaMerge did not produce a summary. Check the prior action step logs."
          fi
          echo
          echo "CAR artifact: ${{ inputs.artifact-name }}"
        } >> "$GITHUB_STEP_SUMMARY"
    - name: Upload CertaMerge CAR
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.output }}
    - name: Fail on blocking verdict when configured
      if: ${{ inputs.fail-on-block == 'true' }}
      shell: bash
      run: |
        python - "$CM_CAR" <<'PY'
        import json
        import sys
        path = sys.argv[1]
        with open(path, "r", encoding="utf-8") as handle:
            car = json.load(handle)
        verdict = car["verdict"]["state"]
        blocking = {"BLOCK", "HARD_BLOCK", "SOFT_BLOCK", "REPAIR_REQUIRED", "NEEDS_EVIDENCE", "OBSERVE_ONLY_WOULD_BLOCK"}
        if verdict in blocking:
            raise SystemExit(f"CertaMerge blocking verdict: {verdict}")
        PY
      env:
        CM_CAR: ${{ inputs.output }}
